    const ABI = [{"type":"constructor","inputs":[{"name":"_tokens","type":"address[]"},{"name":"_seaport","type":"address"}],"stateMutability":"nonpayable"},{"type":"function","name":"getWhitelistedTokens","inputs":[],"outputs":[{"name":"","type":"address[]"}],"stateMutability":"view"},{"type":"function","name":"seaport","inputs":[],"outputs":[{"name":"","type":"address"}],"stateMutability":"view"}];

    const SEAPORT_ADDRESS = "0x0000000000000068F116a894984e2DB1123eB395";

    const SEPOLIA_TOKENS = [
      "0xfFf9976782d46CC05630D1f6eBAb18b2324d6B14", // WETH
      "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238", // USDC
    ];

    const SEPOLIA_CHAIN_ID = 11155111;

    const log = document.getElementById("log");
    const btn = document.getElementById("deployBtn");

    function appendLog(msg, cls) {
      const span = document.createElement("span");
      span.className = cls || "";
      span.textContent = msg + "\n";
      log.appendChild(span);
    }

    async function deploy() {
      btn.disabled = true;
      log.innerHTML = "";

      try {
        if (!window.ethereum) {
          appendLog("MetaMask not found. Install it and reload.", "error");
          btn.disabled = false;
          return;
        }

        appendLog("Requesting wallet connection...", "info");
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const address = await signer.getAddress();
        appendLog("Connected: " + address, "success");

        // Check chain
        const network = await provider.getNetwork();
        if (Number(network.chainId) !== SEPOLIA_CHAIN_ID) {
          appendLog("Please switch to Sepolia (chain ID 11155111) in MetaMask.", "error");
          btn.disabled = false;
          return;
        }
        appendLog("Network: Sepolia", "info");

        // Deploy
        appendLog("Deploying OTCZone...", "info");
        const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
        const contract = await factory.deploy(SEPOLIA_TOKENS, SEAPORT_ADDRESS);
        appendLog("Tx sent: " + contract.deploymentTransaction().hash, "info");

        appendLog("Waiting for confirmation...", "info");
        await contract.waitForDeployment();
        const addr = await contract.getAddress();
        appendLog("OTCZone deployed at: " + addr, "success");

        // Verify
        appendLog("\nVerifying...", "info");
        const tokens = await contract.getWhitelistedTokens();
        appendLog("Whitelisted tokens: " + tokens.join(", "), "success");
        const seaportAddr = await contract.seaport();
        appendLog("Seaport: " + seaportAddr, "success");

        appendLog("\nDone! Copy the address above and update constants.js", "success");

      } catch (err) {
        appendLog("Error: " + (err.reason || err.message), "error");
        btn.disabled = false;
      }
    }
